<!DOCTYPE html>
<html>
<head>
<title>NyayaAI Chat</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  padding:40px;
}
.container{
  width:500px;
}
#chat{
  background:#222;
  padding:15px;
  height:400px;
  overflow-y:auto;
  border-radius:10px;
}
.message{
  margin:10px 0;
}
.user{color:#4fc3f7;}
.bot{color:#81c784;}
input{
  width:80%;
  padding:10px;
  margin-top:10px;
}
button{
  padding:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>⚖️ NyayaAI Legal Chat</h2>

<div id="chat"></div>

<input id="question" placeholder="Ask legal question..." />
<button onclick="send()">Send</button>
</div>

<script>
async function send() {

  const input = document.getElementById("question");
  const chat = document.getElementById("chat");

  const question = input.value;

  chat.innerHTML += `<div class="message user">You: ${question}</div>`;

  const res = await fetch("http://127.0.0.1:8000/ask", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({question})
  });

  const data = await res.json();

  chat.innerHTML += `<div class="message bot">NyayaAI: ${data.answer}</div>`;

  input.value="";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
